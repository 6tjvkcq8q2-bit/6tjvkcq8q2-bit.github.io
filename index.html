<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>追风的人二维码生成器</title>
  <!-- 引入二维码核心库 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e9edf5 100%);
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: #ffffff;
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 500px;
      padding: 2.2rem 1.8rem;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    @media (max-width: 480px) {
      .card {
        padding: 1.8rem 1.2rem;
        border-radius: 2rem;
      }
    }

    .header {
      text-align: center;
      margin-bottom: 2.2rem;
    }

    .title {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .title-icon {
      font-size: 2rem;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
    }

    .subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 0.4rem;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .input-group {
      margin-bottom: 1.8rem;
    }

    .label-text {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: #334155;
      margin-bottom: 0.5rem;
      margin-left: 0.3rem;
    }

    .text-input-wrapper {
      display: flex;
      align-items: center;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 1.2rem;
      padding: 0.1rem 0.1rem 0.1rem 1.2rem;
      transition: border 0.2s, box-shadow 0.2s;
      background: #ffffff;
    }

    .text-input-wrapper:focus-within {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
    }

    #textInput {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.9rem 0.4rem;
      font-size: 1rem;
      outline: none;
      color: #0f172a;
      font-weight: 400;
      width: 100%;
      min-width: 0;
    }

    #textInput::placeholder {
      color: #94a3b8;
      font-weight: 300;
    }

    .file-upload-area {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .file-label {
      background: #f1f5f9;
      border: 1px dashed #cbd5e1;
      border-radius: 1rem;
      padding: 0.7rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
      background: #ffffff;
      white-space: nowrap;
    }

    .file-label:hover {
      background: #eef2ff;
      border-color: #818cf8;
      color: #4f46e5;
    }

    .file-icon {
      font-size: 1.2rem;
    }

    #fileInput {
      display: none;
    }

    .file-name {
      font-size: 0.85rem;
      color: #2563eb;
      background: #eff6ff;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid #bfdbfe;
    }

    .file-name.hidden {
      display: none;
    }

    .size-hint {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-left: 0.3rem;
    }

    .button-row {
      display: flex;
      gap: 1rem;
      margin: 1.8rem 0 1.5rem;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      background: white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
      border: 1px solid transparent;
    }

    .btn-generate {
      background: #1e293b;
      color: white;
      box-shadow: 0 8px 20px -8px rgba(30, 41, 59, 0.4);
    }

    .btn-generate:hover {
      background: #0f172a;
      transform: translateY(-2px);
      box-shadow: 0 12px 22px -10px rgba(15, 23, 42, 0.5);
    }

    .btn-generate:active {
      transform: translateY(0);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .btn-clear {
      background: #ffffff;
      color: #475569;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .btn-clear:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
      color: #1e293b;
      transform: translateY(-1px);
    }

    .qrcode-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 0.8rem;
      padding: 1.2rem;
      background: #ffffff;
      border-radius: 1.5rem;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
      min-height: 180px;
      transition: all 0.2s;
    }

    .qrcode-placeholder {
      color: #94a3b8;
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
      background: #f9fafb;
      border-radius: 1rem;
      width: 100%;
      border: 1px dashed #e2e8f0;
    }

    #qrcodeDisplay {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 180px;
    }

    /* 二维码内部canvas样式微调 */
    #qrcodeDisplay canvas,
    #qrcodeDisplay img {
      border-radius: 0.8rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      max-width: 100%;
      height: auto;
    }

    .toast-message {
      color: #b91c1c;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      text-align: center;
      font-weight: 500;
      background: #fee2e2;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      display: none;
    }

    .footer-note {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: #94a3b8;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="title">
        <span class="title-icon">🏃‍♂️</span>
        <span>追风的人</span>
      </div>
      <div class="subtitle">二维码生成器 · 简约即自由</div>
    </div>

    <!-- 文本输入区域 -->
    <div class="input-group">
      <label class="label-text" for="textInput">📝 文字 / 网址 / 手机号</label>
      <div class="text-input-wrapper">
        <input type="text" id="textInput" placeholder="输入内容，例如 https://example.com 或 13800138000" autocomplete="off" />
      </div>
    </div>

    <!-- 文件上传区域 (图片、文档) -->
    <div class="file-upload-area">
      <label for="fileInput" class="file-label">
        <span class="file-icon">📎</span> 选择文件
      </label>
      <input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx,.csv" />
      <span id="fileNameDisplay" class="file-name hidden"></span>
      <span class="size-hint">支持图片/文档, 建议≤3KB</span>
    </div>
    <div id="fileToast" class="toast-message"></div>

    <!-- 操作按钮 -->
    <div class="button-row">
      <button id="generateBtn" class="btn btn-generate">
        <span>✨</span> 生成二维码
      </button>
      <button id="clearBtn" class="btn btn-clear">
        <span>🧹</span> 清空
      </button>
    </div>

    <!-- 二维码展示区 -->
    <div class="qrcode-container" id="qrcodeContainer">
      <div id="qrcodeDisplay">
        <div class="qrcode-placeholder" id="placeholder">
          输入内容或上传文件<br>点击「生成二维码」
        </div>
      </div>
    </div>
    <div class="footer-note">扫码即可访问 · 所有数据均在本地处理</div>
  </div>

  <script>
    (function() {
      // DOM 元素
      const textInput = document.getElementById('textInput');
      const fileInput = document.getElementById('fileInput');
      const fileNameDisplay = document.getElementById('fileNameDisplay');
      const generateBtn = document.getElementById('generateBtn');
      const clearBtn = document.getElementById('clearBtn');
      const qrcodeDisplay = document.getElementById('qrcodeDisplay');
      const placeholder = document.getElementById('placeholder');
      const fileToast = document.getElementById('fileToast');

      // 状态变量
      let currentFileDataUrl = null;      // 存储文件的 data URL
      let currentFileName = '';
      let qrCodeInstance = null;         // 用于清除原有二维码

      // 文件大小限制 (字节) - 为了二维码可扫描，data URL 长度应尽量短
      const MAX_FILE_SIZE = 3500;        // 约3.4KB，实际Base64后长度会增加，但总字符控制在2500以内较安全
      const MAX_DATAURL_LENGTH = 2500;   // 二维码字节模式容量约2953，留出余量

      // 工具函数：隐藏或显示占位符
      function togglePlaceholder(show) {
        if (show) {
          placeholder.style.display = 'block';
        } else {
          placeholder.style.display = 'none';
        }
      }

      // 清除原有二维码
      function clearQRCode() {
        if (qrCodeInstance && qrCodeInstance.clear) {
          qrCodeInstance.clear();
        }
        // 移除所有canvas子元素 (qrcodejs 可能生成多个)
        while (qrcodeDisplay.firstChild) {
          qrcodeDisplay.removeChild(qrcodeDisplay.firstChild);
        }
        // 重新添加占位符
        if (!qrcodeDisplay.contains(placeholder)) {
          qrcodeDisplay.appendChild(placeholder);
        }
        togglePlaceholder(true);
        qrCodeInstance = null;
      }

      // 显示错误提示
      function showFileToast(message) {
        fileToast.textContent = message;
        fileToast.style.display = 'block';
        setTimeout(() => {
          fileToast.style.display = 'none';
        }, 4000);
      }

      function hideFileToast() {
        fileToast.style.display = 'none';
      }

      // 生成二维码核心逻辑
      function generateQRCode(content) {
        // 先清除旧二维码
        clearQRCode();

        if (!content || content.trim() === '') {
          showFileToast('内容为空，无法生成');
          return;
        }

        // 内容长度检查 (针对文本内容)
        if (content.length > MAX_DATAURL_LENGTH) {
          showFileToast('内容过长，二维码可能无法扫描，请精简内容');
          return;
        }

        try {
          // 使用 qrcodejs 生成二维码
          qrCodeInstance = new QRCode(qrcodeDisplay, {
            text: content,
            width: 200,
            height: 200,
            colorDark: "#1e293b",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.L  // 最低纠错，提高容量
          });
          // 隐藏占位符（qrcodejs 会添加canvas，移除占位符）
          if (qrcodeDisplay.contains(placeholder)) {
            qrcodeDisplay.removeChild(placeholder);
          }
          togglePlaceholder(false);
          hideFileToast();
        } catch (error) {
          console.error(error);
          showFileToast('生成二维码失败，内容可能不兼容或过长');
          // 恢复占位符
          if (!qrcodeDisplay.contains(placeholder)) {
            qrcodeDisplay.appendChild(placeholder);
          }
          togglePlaceholder(true);
        }
      }

      // 处理文件上传
      fileInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        hideFileToast();
        
        // 清除之前的文件数据
        currentFileDataUrl = null;
        currentFileName = '';
        fileNameDisplay.textContent = '';
        fileNameDisplay.classList.add('hidden');

        if (!file) {
          return;
        }

        // 检查文件类型 (可选，这里不做严格限制，但可以提示音频视频不支持)
        const fileName = file.name;
        const fileType = file.type;
        // 如果用户选择音频或视频，给出友好提示（但根据需求可以忽略支持）
        if (fileType.startsWith('audio/') || fileType.startsWith('video/')) {
          showFileToast('暂不支持音频/视频文件，请选择图片或文档');
          fileInput.value = ''; // 清空文件选择
          return;
        }

        // 文件大小检查
        if (file.size > MAX_FILE_SIZE) {
          showFileToast(`文件过大 (${(file.size/1024).toFixed(1)}KB)，请选择小于${(MAX_FILE_SIZE/1024).toFixed(1)}KB的文件`);
          fileInput.value = '';
          return;
        }

        // 读取文件为 data URL
        const reader = new FileReader();
        reader.onload = function(e) {
          const dataUrl = e.target.result;
          // 再次检查 data URL 长度
          if (dataUrl.length > MAX_DATAURL_LENGTH) {
            showFileToast('文件转换后数据过长，无法生成可扫描二维码，请尝试更小的文件');
            fileInput.value = '';
            fileNameDisplay.textContent = '';
            fileNameDisplay.classList.add('hidden');
            currentFileDataUrl = null;
            return;
          }
          // 保存有效数据
          currentFileDataUrl = dataUrl;
          currentFileName = file.name;
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.remove('hidden');
          hideFileToast();
        };
        reader.onerror = function() {
          showFileToast('文件读取失败，请重试');
          fileInput.value = '';
        };
        reader.readAsDataURL(file);
      });

      // 生成按钮点击
      generateBtn.addEventListener('click', function() {
        hideFileToast();
        // 优先使用上传的文件 (如果有)
        if (currentFileDataUrl) {
          generateQRCode(currentFileDataUrl);
        } else {
          // 使用文本输入
          const text = textInput.value.trim();
          if (!text) {
            showFileToast('请输入文字或上传文件');
            return;
          }
          generateQRCode(text);
        }
      });

      // 清空按钮
      clearBtn.addEventListener('click', function() {
        // 清空文本输入
        textInput.value = '';
        // 清空文件相关
        fileInput.value = '';
        currentFileDataUrl = null;
        currentFileName = '';
        fileNameDisplay.textContent = '';
        fileNameDisplay.classList.add('hidden');
        // 清除二维码
        clearQRCode();
        hideFileToast();
        // 确保占位符显示
        if (!qrcodeDisplay.contains(placeholder)) {
          qrcodeDisplay.appendChild(placeholder);
        }
        togglePlaceholder(true);
        // 聚焦到输入框方便用户
        textInput.focus();
      });

      // 额外：如果用户在输入框按回车，也可以触发生成
      textInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          generateBtn.click();
        }
      });

      // 初始化时显示占位符
      togglePlaceholder(true);
    })();
  </script>
</body>
</html>
