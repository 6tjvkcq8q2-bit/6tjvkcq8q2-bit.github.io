<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>追风的人 · 个人博客</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body{
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    /* 蓝紫高级动态渐变背景 */
    background: linear-gradient(-45deg,#4158D0,#C850C0,#6dd5ed,#2193b0);
    background-size: 400% 400%;
    animation: bgFlow 15s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    /* 优化字体：适配多平台的优雅无衬线字体 */
    font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
}
@keyframes bgFlow{
    0%{background-position: 0% 50%;}
    50%{background-position: 100% 50%;}
    100%{background-position: 0% 50%;}
}

/* 圆形头像框（保留，你之后可以自己加图片） */
.avatar-ring{
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid #ffffff;
    margin-bottom: 30px;
    background: rgba(255,255,255,0.15);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

/* 毛玻璃标题容器，层次更丰富 */
.title-card {
    text-align: center;
    padding: 40px 60px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

/* 主标题优化：字重、字间距、阴影，高级感拉满 */
.blog-title{
    font-size: 42px;
    letter-spacing: 10px;
    font-weight: 700;
    text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    margin-bottom: 15px;
}

/* 副标题优化：柔和透明度+优雅字间距 */
.blog-subtitle{
    font-size: 18px;
    opacity: 0.85;
    letter-spacing: 4px;
    font-weight: 300;
}

/* 页面淡入动画，加载更丝滑 */
html {
    animation: fadeIn 1.2s ease;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
    <!-- 圆形头像框（已保留，后续可替换为图片） -->
    <div class="avatar-ring"></div>

    <div class="title-card">
        <div class="blog-title">追风的人</div>
        <div class="blog-subtitle">个人博客 · 时光自留地</div>
    </div>
</body>
</html>
